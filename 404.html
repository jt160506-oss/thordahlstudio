<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Siden findes ikke — Thordahl</title>
<meta name="robots" content="noindex">
<link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
<link rel="preload" as="font" type="font/woff2" crossorigin href="/assets/fonts/space-grotesk-latin-wght-normal.woff2">
<link rel="preload" as="font" type="font/woff2" crossorigin href="/assets/fonts/bricolage-grotesque-latin-wght-normal.woff2">
<style>
/* 404 har egen inline-CSS og linker ikke style.css — derfor gentages
   de to @font-face her, saa siden faar de rigtige skrifttyper. */
@font-face{font-family:'Space Grotesk';font-style:normal;font-display:swap;font-weight:300 700;src:url(/assets/fonts/space-grotesk-latin-wght-normal.woff2) format('woff2-variations')}
@font-face{font-family:'Bricolage Grotesque';font-style:normal;font-display:swap;font-weight:200 800;src:url(/assets/fonts/bricolage-grotesque-latin-wght-normal.woff2) format('woff2-variations')}
*{margin:0;padding:0;box-sizing:border-box}
a{text-decoration:none}
:root{--bg:#08080A;--ink:#EFEBE1;--mut:#7C7C86;--acc:#C6FF3D}
body{background:var(--bg);color:var(--ink);font-family:"Space Grotesk",sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
.code{font-family:"Bricolage Grotesque";font-weight:800;font-size:clamp(72px,18vw,160px);line-height:1;letter-spacing:-.04em}
.code span{color:var(--acc)}
p{color:#B4B3BC;margin:18px 0 32px;font-size:17px}
.btn{display:inline-flex;align-items:center;gap:10px;background:var(--acc);color:#0A140A;padding:15px 28px;border-radius:100px;font-weight:600;font-size:14.5px;transition:transform .3s,box-shadow .3s}
.btn:hover{transform:translateY(-3px);box-shadow:0 0 40px rgba(198,255,61,.4)}
</style>
</head>
<body>
<div>
  <h1 class="code">4<span>0</span>4</h1>
  <p>Den side findes ikke — men det gør en god samtale.</p>
  <a class="btn" href="/">Tilbage til forsiden →</a>
</div>
</body>
</html>
